<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link
       rel="stylesheet"
       href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <title>tic tac toc</title>
</head>
<body >
    <div class="navbar">
    <div class="logo">Tic Tac Toe</div>

    <div class="theme">
        <i class="fa-solid fa-palette"></i>

        <div class="theme-options hide">
            <div class="theme-option p" data-theme="pink">Pink</div>
            <div class="theme-option b" data-theme="blue">Blue</div>
            <div class="theme-option w" data-theme="wood">Woody</div>
            <div class="theme-option d" data-theme="dark">Dark</div>
            <p class="creator">Created by Raza</p>
        </div>
    </div>

    <div class="contact">
        <i class="fas fa-envelope"></i>
    </div>

</div>
    <div class="msg-container hide">
        <div class="msg">winner</div>
        <button class="new-btn">New Game</button>
    </div>
    <main>
        <div class="container">
            <div class="game">
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
            </div>
        </div>
        <button class="reset">Reset</button>
    </main>
    




</body>
<script src="script.js"></script>

</html>
