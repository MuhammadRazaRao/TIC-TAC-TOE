<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link
     rel="stylesheet"
     href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
  <title>Tic Tac Toe</title>
</head>
<body>

  <!-- LOADING SCREEN -->
  <div class="loading-screen">
    <div class="loading-box">
      <h1 class="game-title">TIC TAC TOE</h1>
      <img src="icoon_imresizer.png" alt="Game Image" class="loading-img">
      <div class="loader"></div>
      <p class="loading-text">Loading...</p>
    </div>
  </div>

  <!-- WELCOME CONTAINER -->
  <div class="welcome-container">
    <div class="welcome-msg">
      <h1>Welcome to X&O</h1>
      <div class="mode-btn player-mode">Player vs Player</div>
      <div class="mode-btn ai-mode">Play with AI</div>
    </div>

    <div class="players-section hide">
      <h2>Player vs Player</h2>
      <div class="player-row">
        <input type="text" placeholder="Player 1 Name" id="player1-name">
        <div class="symbol x">X</div>
      </div>
      <div class="player-row">
        <input type="text" placeholder="Player 2 Name" id="player2-name">
        <div class="symbol o">O</div>
      </div>
      <button class="start-btn">Start Game</button>
      <button class="back-btn">Back</button>
    </div>
  </div>

  <!-- NAVBAR TOP -->
  <div class="navbar">
  <div class="logo">X&O</div>
</div>

<!-- NAVBAR BUTTONS -->
<div class="navbar-buttons">
  <button class="contact-btn">
    <i class="fas fa-envelope"></i>
  </button>

  <div class="theme">
    <i class="fa-solid fa-palette"></i>
  </div>

  <div class="home">
    <i class="fas fa-home"></i>
  </div>
</div>

<!-- THEME POPUP (MOVE IT OUTSIDE) -->
<div class="theme-options hide">
  <button class="theme-close">&times;</button>
  <div class="theme-option p1" data-theme="power1"></div>
  <div class="theme-option p2" data-theme="power2"></div>
  <div class="theme-option p3" data-theme="power3"></div>
  <div class="theme-option ch" data-theme="choze"></div>
  <div class="theme-option gl" data-theme="golo"></div>
  <div class="theme-option bil" data-theme="bilian"></div>
  <div class="theme-option dr" data-theme="dar"></div>
  <div class="theme-option ps" data-theme="paisa"></div>
  <div class="theme-option st" data-theme="star"></div>
</div>

<div class="contact-box hide">
  <button class="contact-close">&times;</button>
  <div class="top-icons">
    <div class="instagram">
      <a href="https://www.instagram.com/m.raza_rao?igsh=eWZtcWNtcXE1amVx" target="_main"><i class="fa-brands fa-square-instagram"></i></a>
    </div>

    <div class="whatsapp"><a href="https://wa.me/923239885813?text=Hi%2C%20I%20used%20your%20app%20TIC-TAC-TOE" target="_blank"><i class="fa-brands fa-square-whatsapp"></i></a>
    </div>

    <div class="mail">
      <a href="https://mail.google.com/mail/u/0/#inbox/FMfcgzQfCDQjWVlsxrJXNVCtqksxgVKn?compose=CllgCJlHnRnmKDlFTjcmSgCPqdxhMsGmdbQwrhxpdMVLDgXtSDBQjpxvPQcfdSRrkLGRLJDdZCg" target="_main"><i class="fa fa-envelope" aria-hidden="true"></i></a>
    </div>
  </div>

  <h1>Developer's Notes</h1>
  <p>This is a game I created because I love playing it. If you want to contact me, use these social links. Thanks for using.</p>
  <p>Stay Updated</p>
  <p>Created by M.Raza</p>

</div>

  <!-- MESSAGE POPUP -->
  <div class="msg-container hide">
    <div class="msg">Winner</div>
    <button class="new-btn">New Game</button>
  </div>

   <!-- GAME AREA -->
  <main>
    <p class="turn-indicator">Turn: Player 1 (O)</p>
    <div class="container">
      <div class="game">
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
      </div>
    </div>
    <button class="reset">Reset</button>
  </main>
  <canvas id="confetti"></canvas>

  <script src="script.js"></script>
</body>
</html>
